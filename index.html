<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Le Monde des Jeux ! ☀️</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; }
        
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background: #b3e5fc;
            font-family: 'Nunito', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            user-select: none;
            -webkit-user-select: none;
        }

        .arcade-container {
            position: relative;
            width: 100%;
            height: 100%;
            max-width: 450px;
            max-height: 750px;
            background: linear-gradient(to bottom, #87CEEB 0%, #E0F7FA 70%, #FFF9C4 100%);
            border: 8px solid #ffb74d;
            border-radius: 30px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.15);
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* Décor du menu */
        .sun {
            position: absolute;
            top: 40px;
            right: 40px;
            width: 70px;
            height: 70px;
            background: #ffeb3b;
            border-radius: 50%;
            box-shadow: 0 0 25px #ffeb3b;
            z-index: 1;
        }

        .cloud {
            position: absolute;
            background: #fff;
            border-radius: 50px;
            z-index: 1;
            opacity: 0.85;
        }
        .cloud-1 { width: 100px; height: 40px; top: 60px; left: 30px; }
        .cloud-2 { width: 130px; height: 50px; top: 140px; right: 20px; }

        .landscape-bottom {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 120px;
            background: #81c784;
            border-top-left-radius: 50% 20px;
            border-top-right-radius: 50% 20px;
            z-index: 2;
            pointer-events: none;
        }

        .tree {
            position: absolute;
            bottom: 90px;
            width: 30px;
            height: 40px;
            background: #388e3c;
            border-radius: 50% 50% 0 0;
        }
        .tree::after {
            content: '';
            position: absolute;
            bottom: -15px;
            left: 11px;
            width: 8px;
            height: 15px;
            background: #795548;
        }
        .tree-1 { left: 40px; }
        .tree-2 { left: 90px; transform: scale(0.8); }
        .tree-3 { right: 50px; transform: scale(1.1); }

        /* Écrans */
        .screen {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
            z-index: 3;
        }

        .screen.active {
            opacity: 1;
            pointer-events: auto;
        }

        .menu-overlay {
            background: rgba(255, 255, 255, 0.3);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
        }

        h1 {
            font-family: 'Fredoka One', cursive;
            color: #ff5722;
            font-size: 2.2rem;
            text-align: center;
            margin-bottom: 40px;
            text-shadow: 2px 2px 0px #fff;
        }

        .grid-menu {
            display: flex;
            flex-direction: column;
            gap: 25px;
            width: 85%;
        }

        .btn-game {
            background: #fff;
            border: 4px solid #4fc3f7;
            padding: 22px;
            border-radius: 20px;
            color: #333;
            font-family: 'Fredoka One', cursive;
            font-size: 1.2rem;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 8px 0px #4fc3f7;
            text-align: center;
        }

        .btn-game:active {
            transform: translateY(4px);
            box-shadow: 0 4px 0px #4fc3f7;
        }

        .btn-game.case-2 {
            border-color: #ffb74d;
            box-shadow: 0 8px 0px #ffb74d;
        }

        /* Zone de Jeu */
        .game-header {
            position: absolute;
            top: 20px;
            width: 90%;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            z-index: 10;
            font-family: 'Fredoka One', cursive;
        }

        .btn-back {
            background: #ff8a80;
            border: 3px solid #ff5252;
            box-shadow: 0 4px 0 #ff5252;
            padding: 6px 16px;
            border-radius: 12px;
            color: #fff;
            cursor: pointer;
            font-size: 0.9rem;
        }
        .btn-back:active { transform: translateY(2px); box-shadow: 0 2px 0 #ff5252; }

        .score-container {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 5px;
        }

        .score-box {
            background: #fff;
            padding: 6px 16px;
            border-radius: 12px;
            border: 3px solid #ffb74d;
            color: #ff9800;
            font-size: 1.1rem;
        }

        .highscore-box {
            background: #fff;
            padding: 4px 12px;
            border-radius: 10px;
            border: 3px solid #4fc3f7;
            color: #039be5;
            font-size: 0.9rem;
            display: none;
        }

        canvas {
            background: transparent;
            display: block;
            width: 100%;
            height: 100%;
        }

        .overlay-win {
            background: rgba(255, 255, 255, 0.95);
            z-index: 100;
        }

        .surprise-card {
            background: #fff;
            border: 6px dashed #ffb74d;
            padding: 40px 25px;
            border-radius: 24px;
            width: 90%;
            text-align: center;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }

        .surprise-card h2 {
            font-family: 'Fredoka One', cursive;
            color: #4caf50;
            font-size: 2rem;
            margin-top: 0;
        }
    </style>
</head>
<body>

    <div class="arcade-container">
        <!-- Décor de base -->
        <div class="sun" id="bgSun"></div>
        <div class="cloud cloud-1" id="bgCloud1"></div>
        <div class="cloud cloud-2" id="bgCloud2"></div>
        
        <div class="landscape-bottom" id="bgLandscape">
            <div class="tree tree-1"></div>
            <div class="tree tree-2"></div>
            <div class="tree tree-3"></div>
        </div>
        
        <!-- ÉCRAN 1 : LE MENU -->
        <div class="screen active menu-overlay" id="menuScreen">
            <h1>Prend un jeux et dit moi si c bien </h1>
            <div class="grid-menu">
                <button class="btn-game " onclick="startLauncher(1)">
                    Saut Mateo 
                </button>
                <button class="btn-game " onclick="startLauncher(2)">
                    Attrape Nisa BOUAHAHA
                </button>
            </div>
        </div>

        <!-- ÉCRAN 2 : ZONE DE JEU -->
        <div class="screen" id="gameScreen" style="padding:0;">
            <div class="game-header">
                <button class="btn-back" onclick="backToMenu()">↩ Quitter</button>
                <div class="score-container">
                    <div class="highscore-box" id="highScore">REC: 0</div>
                    <div class="score-box" id="gameScore">SCORE: 0</div>
                </div>
            </div>
            <canvas id="mainCanvas" width="400" height="650"></canvas>
        </div>

        <!-- ÉCRAN 3 : SURPRISE -->
        <div class="screen overlay-win" id="winScreen">
            <div class="surprise-card">
                <h2>BRAVO ! 🎉 ☀️</h2>
                <p style="color: #555; line-height: 1.6; font-size: 1.1rem;">
                    Tu as attrapé les 50 étoiles ! Tu as officiellement gagné. J'ai préparé un super programme pour nous. Regarde-moi maintenant pour savoir ce que c'est en vrai ! 😉
                </p>
                <button class="btn-back" style="margin-top:20px; float:none;" onclick="backToMenu()">Retour au menu</button>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('mainCanvas');
        const ctx = canvas.getContext('2d');
        
        const menuScreen = document.getElementById('menuScreen');
        const gameScreen = document.getElementById('gameScreen');
        const winScreen = document.getElementById('winScreen');
        const scoreUI = document.getElementById('gameScore');
        const highScoreUI = document.getElementById('highScore');

        const bgSun = document.getElementById('bgSun');
        const bgCloud1 = document.getElementById('bgCloud1');
        const bgCloud2 = document.getElementById('bgCloud2');
        const bgLandscape = document.getElementById('bgLandscape');

        // Images pour les jeux
        const imgHead = new Image();
        imgHead.src = "https://i.postimg.cc/x1YMdjcX/Ma-tete.png";

        const imgNisa1 = new Image();
        imgNisa1.src = "https://i.postimg.cc/PJdGV8SW/Background-Eraser-20260712-172543488.png";

        const imgNisa2 = new Image();
        imgNisa2.src = "https://i.postimg.cc/RCd2VhPj/Background-Eraser-20260712-172742585.png";

        let currentImgGame = 0; 
        let gameLoopId = null;
        let running = false;
        let score = 0;
        let highScore = localStorage.getItem("neonDashHighScore") || 0;

        let inputX = 200;
        let triggerAction = false;

        highScoreUI.textContent = `REC: ${highScore}`;

        function getCanvasX(clientX) {
            const rect = canvas.getBoundingClientRect();
            return (clientX - rect.left) * (canvas.width / rect.width);
        }

        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            inputX = getCanvasX(e.touches[0].clientX);
            triggerAction = true;
        });
        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            inputX = getCanvasX(e.touches[0].clientX);
        });
        canvas.addEventListener('mousedown', (e) => {
            inputX = getCanvasX(e.clientX);
            triggerAction = true;
        });
        canvas.addEventListener('mousemove', (e) => {
            inputX = getCanvasX(e.clientX);
        });
        window.addEventListener('keydown', (e) => {
            if(e.code === 'Space') triggerAction = true;
        });

        let state = {};

        function initGame(type) {
            score = 0;
            triggerAction = false;
            
            if (type === 1) {
                scoreUI.textContent = "SCORE: 0";
                highScoreUI.style.display = "block";
                highScoreUI.textContent = `REC: ${highScore}`;

                canvas.style.backgroundImage = "url('https://i.postimg.cc/7LH3KPkp/fond.png')";
                canvas.style.backgroundSize = "cover";
                canvas.style.backgroundPosition = "center";
                
                bgSun.style.display = 'none';
                bgCloud1.style.display = 'none';
                bgCloud2.style.display = 'none';
                bgLandscape.style.display = 'none';

                state = {
                    player: { x: 20, y: 150, size: 250, gravity: 0.44, velocity: 0, jump: -8.4 },
                    pipes: [], 
                    pipeWidth: 95, 
                    pipeGap: 252, 
                    speed: 4.0,   
                    baseInterval: 100, 
                    frame: 0
                };
            } 
            else if (type === 2) {
                scoreUI.textContent = "SCORE: 0 / 50";
                highScoreUI.style.display = "none";

                canvas.style.backgroundImage = "none";
                
                bgSun.style.display = 'block';
                bgCloud1.style.display = 'block';
                bgCloud2.style.display = 'block';
                bgLandscape.style.display = 'block';

                state = {
                    basket: { x: 125, y: 520, w: 150, h: 20 },
                    items: [], spawnTimer: 0
                };
            }
        }

        function updateHighscore() {
            if (score > highScore) {
                highScore = score;
                highScoreUI.textContent = `REC: ${highScore}`;
                localStorage.setItem("neonDashHighScore", highScore);
            }
        }

        // --- GAME 1 : NEON DASH ---
        function updateDash() {
            let p = state.player;
            p.velocity += p.gravity; p.y += p.velocity;
            
            if (p.y > canvas.height || p.y < -250) {
                updateHighscore();
                initGame(1);
                return;
            }
            if (triggerAction) { p.velocity = p.jump; triggerAction = false; }

            state.frame++;
            let dynamicInterval = Math.max(40, Math.floor(state.baseInterval * (4.0 / state.speed)));
            
            if (state.frame >= dynamicInterval) {
                let topH = Math.random() * (canvas.height - state.pipeGap - 160) + 40;
                state.pipes.push({ x: canvas.width, top: topH, passed: false });
                state.frame = 0;
            }

            for(let i=state.pipes.length-1; i>=0; i--) {
                let o = state.pipes[i]; o.x -= state.speed;
                
                let pCenterX = p.x + p.size / 2;
                let pCenterY = p.y + p.size / 2;
                let pRadius = 22; 

                let closestX_top = Math.max(o.x, Math.min(pCenterX, o.x + state.pipeWidth));
                let closestY_top = Math.max(0, Math.min(pCenterY, o.top));
                let isCollideTop = ((pCenterX - closestX_top)**2 + (pCenterY - closestY_top)**2) < (pRadius**2);

                let closestX_bot = Math.max(o.x, Math.min(pCenterX, o.x + state.pipeWidth));
                let closestY_bot = Math.max(o.top + state.pipeGap, Math.min(pCenterY, canvas.height));
                let isCollideBot = ((pCenterX - closestX_bot)**2 + (pCenterY - closestY_bot)**2) < (pRadius**2);

                if (isCollideTop || isCollideBot) {
                    updateHighscore();
                    initGame(1);
                    return;
                }
                
                if(!o.passed && o.x + state.pipeWidth < pCenterX) {
                    o.passed = true; 
                    score++; 
                    scoreUI.textContent = `SCORE: ${score}`;
                    state.speed += 0.2;
                }
                if(o.x + state.pipeWidth < 0) state.pipes.splice(i, 1);
            }
        }
        
        function drawRoundedRect(x, y, width, height, radius, isTopTube) {
            ctx.beginPath();
            ctx.moveTo(x + radius, y);
            ctx.lineTo(x + width - radius, y);
            ctx.quadraticCurveTo(x + width, y, x + width, y + radius);
            ctx.lineTo(x + width, y + height - radius);
            ctx.quadraticCurveTo(x + width, y + height, x + width - radius, y + height);
            ctx.lineTo(x + radius, y + height);
            ctx.quadraticCurveTo(x, y + height, x, y + height - radius);
            ctx.lineTo(x, y + radius);
            ctx.quadraticCurveTo(x, y, x + radius, y);
            ctx.closePath();
            ctx.fill();
            ctx.stroke();

            ctx.fillStyle = '#ffb3c6'; 
            ctx.strokeStyle = '#ff85a2';
            ctx.lineWidth = 3;
            let capHeight = 26;
            let capOffsetX = 5;
            if (isTopTube) {
                ctx.fillRect(x - capOffsetX, y + height - capHeight, width + (capOffsetX * 2), capHeight);
                ctx.strokeRect(x - capOffsetX, y + height - capHeight, width + (capOffsetX * 2), capHeight);
                ctx.fillStyle = 'rgba(255,255,255,0.6)';
                ctx.fillRect(x - capOffsetX + 6, y + height - capHeight + 4, 8, capHeight - 8);
            } else {
                ctx.fillRect(x - capOffsetX, y, width + (capOffsetX * 2), capHeight);
                ctx.strokeRect(x - capOffsetX, y, width + (capOffsetX * 2), capHeight);
                ctx.fillStyle = 'rgba(255,255,255,0.6)';
                ctx.fillRect(x - capOffsetX + 6, y + 4, 8, capHeight - 8);
            }
        }

        function drawDash() {
            state.pipes.forEach(o => {
                ctx.fillStyle = '#ffccd5';
                ctx.strokeStyle = '#ff85a2';
                ctx.lineWidth = 3;
                
                drawRoundedRect(o.x, 0, state.pipeWidth, o.top, 12, true);
                ctx.fillStyle = '#ffccd5';
                drawRoundedRect(o.x, o.top + state.pipeGap, state.pipeWidth, canvas.height - (o.top + state.pipeGap), 12, false);
            });
            
            ctx.drawImage(imgHead, state.player.x, state.player.y, state.player.size, state.player.size);
        }

        // --- GAME 2 : ATTRAPE NISA ---
        function updateCatch() {
            let b = state.basket;
            b.x = inputX - b.w/2;
            if(b.x < 0) b.x = 0; if(b.x+b.w > canvas.width) b.x = canvas.width - b.w;

            state.spawnTimer++;
            if(state.spawnTimer % 35 === 0) {
                let chosenImg = Math.random() < 0.5 ? imgNisa1 : imgNisa2;
                
                let targetWidth = 140;
                let targetHeight = chosenImg.naturalWidth ? (chosenImg.naturalHeight / chosenImg.naturalWidth) * targetWidth : targetWidth;

                state.items.push({ 
                    x: Math.random() * (canvas.width - targetWidth), 
                    y: -targetHeight, 
                    w: targetWidth,
                    h: targetHeight,
                    speed: Math.random() * 1.2 + 3.5,
                    img: chosenImg
                });
            }

            for(let i=state.items.length-1; i>=0; i--) {
                let item = state.items[i]; item.y += item.speed;
                
                // Ajustement précis de la hitbox pour exiger que la tête touche directement le panier
                // On réduit artificiellement la hauteur de détection du haut de la tête de 25px
                let hitBoxY = item.y + 25; 
                let hitBoxHeight = item.h - 25;

                if(hitBoxY + hitBoxHeight >= b.y && hitBoxY <= b.y + b.h && item.x + item.w >= b.x && item.x <= b.x + b.w) {
                    state.items.splice(i, 1); 
                    score++; 
                    scoreUI.textContent = `SCORE: ${score} / 50`;
                    
                    if(score >= 50) {
                        triggerWin();
                    }
                    continue;
                }
                
                // Fin de partie ajustée pour correspondre au bas réel de l'image
                if(item.y > 540) { initGame(2); return; }
            }
        }
        
        function drawCatch() {
            // Panier
            ctx.fillStyle = '#ff9800';
            ctx.strokeStyle = '#e65100';
            ctx.lineWidth = 3;
            ctx.beginPath();
            ctx.roundRect(state.basket.x, state.basket.y, state.basket.w, state.basket.h, 8);
            ctx.fill();
            ctx.stroke();
            
            // Dessin
            state.items.forEach(item => {
                ctx.drawImage(item.img, item.x, item.y, item.w, item.h);
            });
        }

        // --- BOUCLE PRINCIPALE ---
        function gameLoop() {
            if(!running) return;
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            if(currentImgGame === 1) { updateDash(); drawDash(); }
            else if(currentImgGame === 2) { updateCatch(); drawCatch(); }

            gameLoopId = requestAnimationFrame(gameLoop);
        }

        function startLauncher(gameId) {
            menuScreen.classList.remove('active');
            gameScreen.classList.add('active');
            currentImgGame = gameId;
            running = true;
            initGame(gameId);
            gameLoop();
        }

        function backToMenu() {
            running = false;
            cancelAnimationFrame(gameLoopId);
            gameScreen.classList.remove('active');
            winScreen.classList.remove('active');
            menuScreen.classList.add('active');
            
            bgSun.style.display = 'block';
            bgCloud1.style.display = 'block';
            bgCloud2.style.display = 'block';
            bgLandscape.style.display = 'block';
            canvas.style.backgroundImage = "none";
        }

        function triggerWin() {
            running = false;
            cancelAnimationFrame(gameLoopId);
            gameScreen.classList.remove('active');
            winScreen.classList.add('active');
        }
    </script>
</body>
</html>
